<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BunnyLink Contact</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#f7f7fb,#eef1f5,#f6f3f7);
  color:#2b2b2b;
}

.container{
  max-width:700px;
  margin:auto;
  padding:80px 20px;
  text-align:center;
}

.logo{
  font-size:48px;
}

.title{
  font-size:26px;
  font-weight:600;
  margin-top:10px;
}

.sub{
  font-size:13px;
  color:#777;
}

.card{
  margin-top:25px;
  background:#ffffffcc;
  border:1px solid #e9e9ee;
  border-radius:16px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.04);
}

.btn{
  display:block;
  margin:10px auto;
  padding:13px 18px;
  border-radius:14px;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  max-width:260px;
}

.primary{
  background:#cfe7d0;
  color:#2b2b2b;
}

.secondary{
  border:1px solid #d6d6dd;
  color:#555;
  background:#fff;
}

.footer{
  margin-top:50px;
  font-size:11px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">🐰</div>

  <div class="title">人工开通</div>

  <div class="sub">Contact Support</div>

  <div class="card">

    <div style="font-size:13px;color:#666;">
      如需人工开通服务，请通过以下方式联系<br>
      我们将为你进行账号开通与使用支持
    </div>

    <a class="btn primary" href="你的微信二维码或链接">
      微信联系
    </a>

    <a class="btn secondary" href="你的QQ链接">
      QQ联系
    </a>

  </div>

  <a class="btn secondary" href="index.html">
    返回首页
  </a>

  <div class="footer">
    BunnyLink © 2026
  </div>

</div>

</body>
</html>
