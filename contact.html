<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BunnyLink - Contact</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#f7f7fb,#eef1f5,#f6f3f7);
  color:#2b2b2b;
}

/* 容器 */
.container{
  max-width:700px;
  margin:auto;
  padding:80px 20px;
  text-align:center;
}

/* logo */
.logo{
  font-size:44px;
  margin-bottom:10px;
}

/* 标题 */
.title{
  font-size:26px;
  font-weight:600;
  color:#333;
}

.sub{
  margin-top:8px;
  font-size:13px;
  color:#777;
}

/* 说明 */
.desc{
  margin-top:20px;
  font-size:13px;
  color:#666;
  line-height:1.8;
}

/* 卡片 */
.card{
  margin-top:30px;
  background:#ffffffcc;
  border:1px solid #e9e9ee;
  border-radius:16px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.04);
}

/* 按钮 */
.btn{
  display:block;
  margin:10px auto;
  padding:13px 18px;
  border-radius:14px;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  max-width:260px;
  transition:0.2s;
}

/* 主按钮 */
.primary{
  background:#cfe7d0;
  color:#2b2b2b;
}

/* 次按钮 */
.secondary{
  border:1px solid #d6d6dd;
  color:#555;
  background:#fff;
}

.primary:hover{
  background:#c6e2c8;
  transform:scale(1.02);
}

.secondary:hover{
  background:#f5f5f7;
}

/* 二维码占位 */
.qr{
  width:160px;
  height:160px;
  margin:15px auto;
  border-radius:12px;
  background:#f2f2f2;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#aaa;
  font-size:12px;
}

/* 底部 */
.footer{
  margin-top:50px;
  font-size:11px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">🐰</div>

  <div class="title">人工开通</div>

  <div class="sub">Contact / Support</div>

  <!-- 说明 -->
  <div class="desc">
    如需人工开通服务，请通过以下方式联系。<br>
    我们将为你进行账号开通与使用指导。
  </div>

  <!-- 微信 -->
  <div class="card">

    <div style="font-size:14px;font-weight:600;">微信联系</div>

    <div class="qr">微信二维码</div>

    <div style="font-size:12px;color:#777;">
      BunnyLink（你的微信号）
    </div>

    <a class="btn primary" href="#">
      打开微信 / 添加好友
    </a>

  </div>

  <!-- QQ -->
  <div class="card">

    <div style="font-size:14px;font-weight:600;">QQ联系</div>

    <div class="qr">QQ二维码</div>

    <div style="font-size:12px;color:#777;">
      QQ客服
    </div>

    <a class="btn secondary" href="#">
      打开QQ / 联系客服
    </a>

  </div>

  <!-- 返回 -->
  <div style="margin-top:30px;">
    <a class="btn secondary" href="index.html">
      返回主页
    </a>
  </div>

  <div class="footer">
    BunnyLink © 2026
  </div>

</div>

</body>
</html>
