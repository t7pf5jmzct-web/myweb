<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BunnyLink</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  background:linear-gradient(135deg,#0b0f1a,#1a1b2e,#2a1b3d);
  color:white;
}

/* 容器 */
.container{
  max-width:900px;
  margin:auto;
  padding:70px 20px;
  text-align:center;
}

/* logo */
.logo{
  font-size:46px;
  margin-bottom:10px;
}

/* 品牌 */
.title{
  font-size:28px;
  font-weight:600;
  letter-spacing:1px;
}

.sub{
  margin-top:8px;
  font-size:13px;
  color:#b8c0cc;
}

/* 特性 */
.features{
  margin-top:25px;
  font-size:13px;
  color:#cdd6e3;
  line-height:1.8;
  opacity:0.9;
}

/* 卡片玻璃 */
.glass{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(16px);
  border-radius:16px;
  padding:16px;
}

/* 套餐 */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  margin-top:30px;
}

.card{
  width:160px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(14px);
  border-radius:14px;
  padding:14px;
}

.price{
  margin-top:6px;
  color:#9bbcff;
  font-size:15px;
}

/* 按钮 */
.btn{
  display:block;
  margin:10px auto;
  padding:13px 18px;
  border-radius:14px;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  max-width:260px;
  transition:0.2s;
}

/* 主按钮（Y2K发光） */
.primary{
  background:linear-gradient(90deg,#7aa2ff,#b58cff);
  color:#000;
  box-shadow:0 0 18px rgba(122,162,255,0.25);
}

/* 次按钮 */
.secondary{
  border:1px solid rgba(122,162,255,0.6);
  color:#9bbcff;
}

/* hover */
.primary:hover{
  transform:scale(1.02);
  box-shadow:0 0 25px rgba(181,140,255,0.35);
}

.secondary:hover{
  background:rgba(122,162,255,0.1);
}

/* 底部 */
.footer{
  margin-top:50px;
  font-size:11px;
  color:#666;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">🐰</div>

  <div class="title">BunnyLink</div>

  <div class="sub">Minimal · Fast · Multi-Device Access</div>

  <!-- 特性 -->
  <div class="features glass" style="margin-top:25px;">
    轻量架构 · 高速连接体验<br>
    多设备支持（iOS / Android / Windows / Mac）<br>
    稳定优化 · 即开即用 · 极简设计
  </div>

  <!-- 套餐 -->
  <div class="cards">

    <div class="card">
      Monthly
      <div class="price">¥20</div>
    </div>

    <div class="card">
      Quarterly
      <div class="price">¥40</div>
    </div>

    <div class="card">
      Half-Year
      <div class="price">¥80</div>
    </div>

    <div class="card">
      Yearly
      <div class="price">¥160</div>
    </div>

  </div>

  <!-- 按钮 -->
  <div style="margin-top:35px;">

    <a class="btn primary" href="你的微店链接" target="_blank">
      立即开通 / Start Access
    </a>

    <a class="btn secondary" href="contact.html">
      人工支持 / Contact Support
    </a>

  </div>

  <div class="footer">
    BunnyLink © 2026 Minimal Access System
  </div>

</div>

</body>
</html>
