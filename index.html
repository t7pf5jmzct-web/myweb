<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BunnyLink</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif;
  background:#f7f7fb;
  color:#1c1c1e;
}

/* 顶部留白（韩系关键） */
.header{
  text-align:center;
  padding:70px 20px 20px;
}

/* SVG Logo */
.logo{
  width:64px;
  height:64px;
  margin:0 auto 10px;
}

/* 标题 */
.title{
  font-size:26px;
  font-weight:600;
  letter-spacing:0.5px;
}

/* 副标题 */
.sub{
  font-size:13px;
  color:#9aa0a6;
  margin-top:6px;
}

/* 极简说明 */
.desc{
  padding:0 28px;
  font-size:13px;
  color:#9aa0a6;
  line-height:1.8;
  text-align:center;
  margin-top:14px;
}

/* 卡片（更轻） */
.card{
  background:#ffffff;
  margin:14px 22px;
  padding:18px;
  border-radius:18px;
  box-shadow:0 6px 20px rgba(0,0,0,0.04);
}

/* 套餐价格 */
.price{
  font-size:13px;
  color:#9aa0a6;
  margin-top:4px;
}

/* 主按钮（极简黑） */
.primary-btn{
  margin:22px;
  padding:14px;
  border-radius:16px;
  background:#111;
  color:white;
  text-align:center;
  font-weight:600;
}

/* 次按钮 */
.secondary-btn{
  margin:10px 22px;
  padding:14px;
  border-radius:16px;
  background:#fff;
  border:1px solid #ececf1;
  text-align:center;
  color:#111;
  font-weight:500;
}

/* 复制按钮 */
.copy-btn{
  margin-top:10px;
  font-size:12px;
  color:#6b7280;
  cursor:pointer;
}

/* toast提示 */
.toast{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  font-size:12px;
  display:none;
}
</style>
</head>

<body>

<!-- SVG Logo（品牌核心） -->
<div class="header">

<svg class="logo" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="42" fill="#111"/>
  <path d="M35 55c8-10 22-10 30 0" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="40" cy="42" r="3" fill="white"/>
  <circle cx="60" cy="42" r="3" fill="white"/>
</svg>

<div class="title">BunnyLink</div>
<div class="sub">Minimal · Stable · Fast</div>

</div>

<!-- 韩系留白说明 -->
<div class="desc">
极简网络访问服务<br>
轻量结构 · 多设备支持 · 即开即用
</div>

<!-- 主入口 -->
<a href="你的微店链接" style="text-decoration:none;">
  <div class="primary-btn">立即自助开通</div>
</a>

<!-- 套餐 -->
<div class="card">
  月卡
  <div class="price">¥20 · 300GB</div>
</div>

<div class="card">
  季卡
  <div class="price">¥40 · 300GB/月</div>
</div>

<div class="card">
  半年
  <div class="price">¥80 · 不限流量</div>
</div>

<div class="card">
  年卡
  <div class="price">¥160 · 不限流量</div>
</div>

<!-- 联系 -->
<div class="secondary-btn" onclick="openContact()">
人工开通 / 联系方式
</div>

<!-- 联系面板 -->
<div id="contact" style="
display:none;
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
border-top-left-radius:22px;
border-top-right-radius:22px;
padding:22px;
box-shadow:0 -10px 30px rgba(0,0,0,0.12);
">

<div style="font-size:16px;font-weight:600;">人工开通</div>

<!-- 微信 -->
<div style="margin-top:16px;">
  <div style="font-size:13px;">微信：BunnyLink</div>
  <div class="copy-btn" onclick="copyText('BunnyLink')">一键复制微信</div>
</div>

<!-- QQ群 -->
<div style="margin-top:16px;">
  <div style="font-size:13px;">QQ群：772320523</div>
  <div class="copy-btn" onclick="copyText('772320523')">一键复制QQ群</div>
</div>

<div style="margin-top:20px;text-align:center;color:#3b82f6;font-size:14px;"
onclick="closeContact()">
关闭
</div>

</div>

<!-- toast -->
<div id="toast" class="toast">已复制</div>

<script>
function openContact(){
  document.getElementById('contact').style.display='block';
}

function closeContact(){
  document.getElementById('contact').style.display='none';
}

/* 一键复制 */
function copyText(text){
  navigator.clipboard.writeText(text);
  showToast("已复制 " + text);
}

/* toast */
function showToast(msg){
  let t=document.getElementById('toast');
  t.innerText=msg;
  t.style.display='block';
  setTimeout(()=>{t.style.display='none';},1500);
}
</script>

</body>
</html>
