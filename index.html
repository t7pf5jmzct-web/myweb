<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BunnyLink</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",sans-serif;
  background:#f7f7fb;
  color:#1c1c1e;
}

/* 顶部 */
.header{
  text-align:center;
  padding:60px 20px 10px;
}

/* 🐰 兔子头Logo（更明显） */
.logo{
  width:92px;
  height:92px;
  margin:0 auto 10px;
}

.title{
  font-size:26px;
  font-weight:600;
}

/* 中文副标题 */
.sub{
  font-size:13px;
  color:#9aa0a6;
  margin-top:6px;
}

/* 简介 */
.desc{
  padding:0 28px;
  font-size:13px;
  color:#9aa0a6;
  line-height:1.8;
  text-align:center;
  margin-top:14px;
}

/* 主按钮 */
.primary-btn{
  margin:18px 22px 10px;
  padding:14px;
  border-radius:16px;
  background:#111;
  color:white;
  text-align:center;
  font-weight:600;
}

/* 次按钮 */
.secondary-btn{
  margin:10px 22px 18px;
  padding:14px;
  border-radius:16px;
  background:#fff;
  border:1px solid #ececf1;
  text-align:center;
  color:#111;
  font-weight:500;
}

/* 卡片 */
.card{
  background:#ffffff;
  margin:14px 22px;
  padding:18px;
  border-radius:18px;
  box-shadow:0 6px 20px rgba(0,0,0,0.04);
}

/* 价格 */
.price{
  font-size:13px;
  color:#9aa0a6;
  margin-top:4px;
}

/* toast */
.toast{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  font-size:12px;
  display:none;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="header">

<!-- 🐰 更明显兔子头SVG -->
<svg class="logo" viewBox="0 0 120 120">
  <!-- 头 -->
  <circle cx="60" cy="62" r="42" fill="#111"/>

  <!-- 兔耳（更长更明显） -->
  <path d="M38 35 C28 0, 56 0, 56 40"
        stroke="white" stroke-width="6"
        fill="none" stroke-linecap="round"/>

  <path d="M82 35 C92 0, 64 0, 64 40"
        stroke="white" stroke-width="6"
        fill="none" stroke-linecap="round"/>

  <!-- 眼睛 -->
  <circle cx="48" cy="60" r="5" fill="white"/>
  <circle cx="72" cy="60" r="5" fill="white"/>

  <!-- 鼻子 -->
  <circle cx="60" cy="72" r="3" fill="white"/>

  <!-- 嘴 -->
  <path d="M50 80 Q60 88 70 80"
        stroke="white" stroke-width="3"
        fill="none" stroke-linecap="round"/>
</svg>

<div class="title">BunnyLink</div>

<!-- ✅ 英文改中文 -->
<div class="sub">极简 · 稳定 · 高速连接</div>

</div>

<!-- 简介 -->
<div class="desc">
极简网络访问服务<br>
轻量结构 · 多设备支持 · 即开即用
</div>

<!-- 主入口 -->
<a href="https://weidian.com/item.html?itemID=7781320001&wfr=c" target="_blank" style="text-decoration:none;">
  <div class="primary-btn">立即自助开通</div>
</a>

<!-- 人工开通 -->
<div class="secondary-btn" onclick="openContact()">
人工开通 / 联系方式
</div>

<!-- 套餐 -->
<div class="card">
  月卡
  <div class="price">¥20 · 300GB</div>
</div>

<div class="card">
  季卡
  <div class="price">¥40 · 300GB/月</div>
</div>

<div class="card">
  半年
  <div class="price">¥80 · 不限流量</div>
</div>

<div class="card">
  年卡
  <div class="price">¥160 · 不限流量</div>
</div>

<!-- 人工弹窗 -->
<div id="contact" style="
display:none;
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
border-top-left-radius:22px;
border-top-right-radius:22px;
padding:22px;
box-shadow:0 -10px 30px rgba(0,0,0,0.12);
">

<div style="font-size:16px;font-weight:600;">人工开通</div>

<div style="font-size:13px;color:#9aa0a6;line-height:1.8;margin-top:10px;">
微信：BunnyLink<br>
QQ群：772320523
</div>

<div style="margin-top:12px;font-size:12px;color:#666;cursor:pointer;"
onclick="copyText('BunnyLink')">
一键复制微信
</div>

<div style="margin-top:10px;font-size:12px;color:#666;cursor:pointer;"
onclick="copyText('772320523')">
一键复制QQ群
</div>

<a href="https://weidian.com/item.html?itemID=7781320001&wfr=c" target="_blank" style="text-decoration:none;">
  <div style="
    margin-top:16px;
    padding:14px;
    border-radius:16px;
    background:#111;
    color:white;
    text-align:center;
    font-weight:600;
  ">
    立即前往微店下单
  </div>
</a>

<div style="margin-top:18px;text-align:center;color:#111;font-size:14px;"
onclick="closeContact()">
关闭
</div>

</div>

<!-- toast -->
<div id="toast" class="toast">已复制</div>

<script>
function openContact(){
  document.getElementById('contact').style.display='block';
}

function closeContact(){
  document.getElementById('contact').style.display='none';
}

function copyText(text){
  navigator.clipboard.writeText(text);
  let t=document.getElementById('toast');
  t.innerText="已复制 "+text;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1500);
}
</script>

</body>
</html>
