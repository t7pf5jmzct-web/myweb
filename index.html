<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BunnyLink</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",sans-serif;
  background:#f5f5f7;
  color:#1c1c1e;
}

/* 顶部 */
.header{
  text-align:center;
  padding:50px 20px 20px;
}

.logo{
  font-size:44px;
}

.title{
  font-size:24px;
  font-weight:600;
}

.sub{
  font-size:13px;
  color:#8e8e93;
  margin-top:6px;
}

/* 卡片 */
.card{
  background:#fff;
  margin:12px 20px;
  padding:16px;
  border-radius:16px;
  box-shadow:0 4px 18px rgba(0,0,0,0.06);
  cursor:pointer;
  transition:0.2s;
}

.card:active{
  transform:scale(0.98);
}

.price{
  font-size:13px;
  color:#8e8e93;
  margin-top:4px;
}

/* 主按钮 */
.primary-btn{
  margin:20px;
  padding:14px;
  border-radius:14px;
  background:#007aff;
  color:white;
  text-align:center;
  font-weight:600;
}

/* 次按钮 */
.secondary-btn{
  margin:10px 20px;
  padding:14px;
  border-radius:14px;
  background:#fff;
  border:1px solid #e5e5ea;
  text-align:center;
  color:#007aff;
  font-weight:500;
}

/* 底部导航 */
.tabbar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:#fff;
  border-top:1px solid #e5e5ea;
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-size:11px;
  color:#8e8e93;
}

.tab{
  text-align:center;
}

/* 弹窗（iOS sheet） */
.modal{
  display:none;
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  padding:20px;
  box-shadow:0 -10px 30px rgba(0,0,0,0.15);
}

.modal h3{
  margin:0;
}

.close{
  margin-top:15px;
  text-align:center;
  color:#007aff;
  font-size:14px;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="header">
  <div class="logo">🐰</div>
  <div class="title">BunnyLink</div>
  <div class="sub">轻量 · 高速 · 多设备支持</div>
</div>

<!-- 简介 -->
<div style="padding:0 20px;font-size:13px;color:#8e8e93;line-height:1.6;">
  极简网络访问服务，即开即用，无复杂配置<br>
  支持 iOS / Android / Windows / Mac
</div>

<!-- 主按钮 -->
<a href="你的微店链接" target="_blank" style="text-decoration:none;">
  <div class="primary-btn">立即自助开通</div>
</a>

<!-- 套餐 -->
<div class="card" onclick="openSheet('月卡 ¥20')">
  月卡
  <div class="price">¥20 · 300GB</div>
</div>

<div class="card" onclick="openSheet('季卡 ¥40')">
  季卡
  <div class="price">¥40 · 300GB/月</div>
</div>

<div class="card" onclick="openSheet('半年 ¥80')">
  半年
  <div class="price">¥80 · 不限流量</div>
</div>

<div class="card" onclick="openSheet('年卡 ¥160')">
  年卡
  <div class="price">¥160 · 不限流量</div>
</div>

<!-- 次按钮 -->
<div class="secondary-btn" onclick="openContact()">
  人工开通 / 联系方式
</div>

<!-- 弹窗 -->
<div class="modal" id="sheet">
  <h3 id="planTitle">套餐</h3>
  <p style="color:#8e8e93;font-size:13px;">
    点击立即开通前往微店完成支付
  </p>

  <a href="你的微店链接" target="_blank" style="text-decoration:none;">
    <div class="primary-btn">前往购买</div>
  </a>

  <div class="close" onclick="closeSheet()">关闭</div>
</div>

<!-- 联系弹窗 -->
<div class="modal" id="contact">
  <h3>人工开通</h3>
  <p style="color:#8e8e93;font-size:13px;">
    微信：BunnyLink<br>
    QQ：xxxxxxx
  </p>
  <div class="close" onclick="closeContact()">关闭</div>
</div>

<!-- tabbar -->
<div class="tabbar">
  <div class="tab">首页</div>
  <div class="tab">套餐</div>
  <div class="tab">我的</div>
</div>

<script>
function openSheet(plan){
  document.getElementById('sheet').style.display='block';
  document.getElementById('planTitle').innerText=plan;
}

function closeSheet(){
  document.getElementById('sheet').style.display='none';
}

function openContact(){
  document.getElementById('contact').style.display='block';
}

function closeContact(){
  document.getElementById('contact').style.display='none';
}
</script>

</body>
</html>
