<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BunnyLink</title>

<style>
body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  background:#0b0c10;
  color:#fff;
}

/* 整体居中 */
.wrap{
  max-width:920px;
  margin:auto;
  padding:70px 20px;
  text-align:center;
}

/* logo */
.logo{
  font-size:34px;
  letter-spacing:1px;
  font-weight:600;
  margin-top:10px;
}

/* 兔子（极简风） */
.rabbit{
  width:70px;
  height:70px;
  margin:0 auto 10px auto;
  border-radius:18px;
  background:#151827;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
}

/* 副标题 */
.sub{
  color:#a7b0c0;
  font-size:14px;
  margin-top:10px;
}

/* 小标签 */
.tag{
  margin-top:18px;
  font-size:13px;
  color:#7f8aa3;
  line-height:1.6;
}

/* 卡片 */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:14px;
  margin-top:45px;
}

.card{
  background:#141826;
  border:1px solid #1f2333;
  padding:18px;
  width:190px;
  border-radius:14px;
  text-align:left;
}

/* hover轻微上浮 */
.card:hover{
  transform:translateY(-4px);
  transition:0.2s;
}

/* 价格 */
.price{
  font-size:20px;
  color:#7aa2ff;
  margin-top:8px;
}

/* 按钮 */
.btn{
  display:inline-block;
  margin-top:45px;
  padding:14px 28px;
  background:#7aa2ff;
  color:#000;
  text-decoration:none;
  border-radius:12px;
  font-weight:600;
}

/* 底部说明 */
.footer{
  margin-top:30px;
  font-size:12px;
  color:#666;
}
</style>

</head>

<body>

<div class="wrap">

  <!-- 兔子logo -->
  <div class="rabbit">🐰</div>

  <div class="logo">BunnyLink</div>

  <div class="sub">Minimal · Stable · Multi-device</div>

  <div class="tag">
    iOS / Android / Windows / Mac<br>
    轻量连接 · 稳定体验 · 简洁设计
  </div>

  <!-- 套餐 -->
  <div class="cards">

    <div class="card">
      <div>月卡</div>
      <div class="price">¥20</div>
      <div style="color:#888;font-size:12px;margin-top:6px;">300GB / month</div>
    </div>

    <div class="card">
      <div>季卡</div>
      <div class="price">¥40</div>
      <div style="color:#888;font-size:12px;margin-top:6px;">300GB / month</div>
    </div>

    <div class="card">
      <div>半年卡</div>
      <div class="price">¥80</div>
      <div style="color:#888;font-size:12px;margin-top:6px;">Unlimited</div>
    </div>

    <div class="card">
      <div>年卡</div>
      <div class="price">¥160</div>
      <div style="color:#888;font-size:12px;margin-top:6px;">Unlimited</div>
    </div>

  </div>

  <a class="btn" href="contact.html">Get Started</a>

  <div class="footer">
    secure access · optimized for mobile
  </div>

</div>

</body>
</html>
