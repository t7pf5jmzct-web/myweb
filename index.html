<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BunnyLink - 选择入口</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#0b0f1a,#111a2e,#0f1f3a);
  color:white;
}

.container{
  max-width:800px;
  margin:auto;
  padding:60px 20px;
  text-align:center;
}

.title{
  font-size:26px;
  font-weight:600;
}

.sub{
  color:#9aa4b2;
  font-size:13px;
  margin-top:10px;
}

.cards{
  display:flex;
  flex-direction:column;
  gap:16px;
  margin-top:40px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  padding:20px;
  border-radius:14px;
  backdrop-filter: blur(10px);
}

.card h3{
  margin:0;
  font-size:16px;
}

.card p{
  font-size:12px;
  color:#9aa4b2;
  margin-top:6px;
}

.btn{
  display:inline-block;
  margin-top:12px;
  padding:12px 18px;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
}

.primary{
  background:#6ea8ff;
  color:#000;
}

.secondary{
  border:1px solid #6ea8ff;
  color:#6ea8ff;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">选择入口</div>
  <div class="sub">Select your access method</div>

  <div class="cards">

    <!-- 微店 -->
    <div class="card">
      <h3>在线购买</h3>
      <p>推荐方式｜自助下单，立即开通服务</p>
      <a class="btn primary" href="你的微店链接" target="_blank">
        进入微店购买
      </a>
    </div>

    <!-- 联系方式 -->
    <div class="card">
      <h3>人工开通</h3>
      <p>微信 / QQ 联系客服，人工处理订单</p>

      <a class="btn secondary" href="你的微信二维码页面或图片链接">
        微信联系
      </a>

      <a class="btn secondary" href="你的QQ链接">
        QQ联系
      </a>
    </div>

  </div>

</div>

</body>
</html>
