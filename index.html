<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BunnyLink</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#f7f7fb,#eef1f5,#f6f3f7);
  color:#2b2b2b;
}

/* 容器 */
.container{
  max-width:860px;
  margin:auto;
  padding:70px 20px;
  text-align:center;
}

/* logo */
.logo{
  font-size:44px;
  margin-bottom:10px;
}

/* 标题 */
.title{
  font-size:28px;
  font-weight:600;
  letter-spacing:1px;
  color:#333;
}

.sub{
  margin-top:8px;
  font-size:13px;
  color:#777;
}

/* 简介 */
.desc{
  margin-top:22px;
  font-size:13px;
  color:#666;
  line-height:1.9;
}

/* 套餐 */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  margin-top:30px;
}

.card{
  width:160px;
  background:#ffffffcc;
  border:1px solid #e9e9ee;
  border-radius:16px;
  padding:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.04);
}

.price{
  margin-top:6px;
  color:#8a8f98;
  font-size:14px;
}

/* 按钮 */
.btn{
  display:block;
  margin:10px auto;
  padding:13px 18px;
  border-radius:14px;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  max-width:260px;
  transition:0.2s;
}

/* 主按钮（奶油绿） */
.primary{
  background:#cfe7d0;
  color:#2b2b2b;
}

/* 次按钮 */
.secondary{
  border:1px solid #d6d6dd;
  color:#555;
  background:#fff;
}

/* hover */
.primary:hover{
  transform:scale(1.02);
  background:#c6e2c8;
}

.secondary:hover{
  background:#f5f5f7;
}

/* 底部 */
.footer{
  margin-top:50px;
  font-size:11px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">🐰</div>

  <div class="title">BunnyLink</div>

  <div class="sub">轻量 · 简洁 · 多设备支持</div>

  <!-- 中文简介（你要的重点） -->
  <div class="desc">
    BunnyLink 提供轻量级网络访问服务，支持多设备使用，界面简洁易用。<br>
    即开即用，无复杂配置，适合日常稳定连接需求。
  </div>

  <!-- 套餐 -->
  <div class="cards">

    <div class="card">
      月卡
      <div class="price">¥20</div>
    </div>

    <div class="card">
      季卡
      <div class="price">¥40</div>
    </div>

    <div class="card">
      半年
      <div class="price">¥80</div>
    </div>

    <div class="card">
      年卡
      <div class="price">¥160</div>
    </div>

  </div>

  <!-- 按钮 -->
  <div style="margin-top:35px;">

    <a class="btn primary" href="你的微店链接" target="_blank">
      立即开通 / 自助下单
    </a>

    <a class="btn secondary" href="contact.html">
      联系人工开通
    </a>

  </div>

  <div class="footer">
    BunnyLink © 2026
  </div>

</div>

</body>
</html>
